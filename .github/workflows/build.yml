name: Build and Push Docker Images

on:
  push:
    tags:
      - 'v*'

env:
  ALIYUN_REGISTRY: ${{ vars.ALIYUN_REGISTRY }}
  ALIYUN_NAMESPACE: ${{ vars.ALIYUN_NAMESPACE }}
  ALIYUN_IMAGE: ${{ vars.ALIYUN_IMAGE }}

jobs:
  build:
    name: Build & push docs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Extract metadata for Docker image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ALIYUN_REGISTRY }}/${{ env.ALIYUN_NAMESPACE }}/${{ env.ALIYUN_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_OSS_BASE_URL=${{ secrets.OSS_BASE_URL }}
            NEXT_PUBLIC_UTTERANCES_REPO=${{ secrets.UTTERANCES_REPO }}
          cache-from: type=gha,scope=docs
          cache-to: type=gha,mode=max,scope=docs
